name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      store:    ${{ steps.filter.outputs.store }}
      admin:    ${{ steps.filter.outputs.admin }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/exiuscart-store/**'
            admin:
              - 'apps/exiuscart-admin/**'
            backend:
              - 'exiuscart-backend/**'

  # ── TypeScript + Python syntax check ──────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p apps/exiuscart-store/tsconfig.json
      - run: npx tsc --noEmit -p apps/exiuscart-admin/tsconfig.json
      - run: |
          find exiuscart-backend/app -name "*.py" | xargs python3 -m py_compile
          echo "Backend syntax OK"

  # ── Backend test suite ─────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: exiuscart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
        working-directory: exiuscart-backend
      - run: pytest
        working-directory: exiuscart-backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/exiuscart_test

  # ── Deploy: pull + build on server ────────────────────────────────────────
  # Build runs on the server so Node version matches the runtime exactly.
  # Affiliates removed from server (runs on Vercel) — 1.3 GB free for builds.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, test, changes]
    if: always() && needs.typecheck.result == 'success' && needs.test.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/ExiusCart
            # deploy.sh is the single source of truth for how to build/reload
            # each app safely (zero-downtime staged builds, only reloads on a
            # successful build, runs Alembic + legacy SQL migrations, only
            # rebuilds what actually changed). Previously this workflow had
            # its own separate, unsafe inline copy (rm -rf .next right before
            # building, so a live request could hit a half-deleted .next and
            # 500) that also ran independently of the webhook-triggered
            # deploy on the same server — the two racing each other, both
            # writing into the same folder, is what was actually corrupting
            # builds. Only one pipeline should ever deploy this server now.
            export BEFORE_SHA=$(git rev-parse HEAD)
            git pull origin main
            bash deploy.sh
