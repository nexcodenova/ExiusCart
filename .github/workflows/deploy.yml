name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      store:    ${{ steps.filter.outputs.store }}
      admin:    ${{ steps.filter.outputs.admin }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/exiuscart-store/**'
            admin:
              - 'apps/exiuscart-admin/**'
            backend:
              - 'exiuscart-backend/**'

  # ── TypeScript + Python syntax check ──────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p apps/exiuscart-store/tsconfig.json
      - run: npx tsc --noEmit -p apps/exiuscart-admin/tsconfig.json
      - run: |
          find exiuscart-backend/app -name "*.py" | xargs python3 -m py_compile
          echo "Backend syntax OK"

  # ── Build on CI runner (16 GB RAM) + rsync to server ──────────────────────
  # Server (2 GB) runs out of RAM trying to build Next.js while apps are live.
  # Solution: build here, rsync only .next/, reload PM2 on server (no build).
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, changes]
    if: always() && needs.typecheck.result == 'success'
    env:
      NEXT_PUBLIC_API_URL: https://api.exiuscart.com
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build changed Next.js apps on CI (plenty of RAM here) ─────────────
      - name: Build store
        if: needs.changes.outputs.store == 'true'
        run: npm run build --workspace=apps/exiuscart-store

      - name: Build admin
        if: needs.changes.outputs.admin == 'true'
        run: npm run build --workspace=apps/exiuscart-admin

      # ── Setup SSH for rsync ────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Rsync .next build output to server (fast — only changed files) ─────
      - name: Sync store build
        if: needs.changes.outputs.store == 'true'
        run: |
          rsync -az --delete --exclude=cache \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            apps/exiuscart-store/.next/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ExiusCart/apps/exiuscart-store/.next/

      - name: Sync admin build
        if: needs.changes.outputs.admin == 'true'
        run: |
          rsync -az --delete --exclude=cache \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            apps/exiuscart-admin/.next/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ExiusCart/apps/exiuscart-admin/.next/

      # ── Pull source + run migrations + reload PM2 (no build on server) ─────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /var/www/ExiusCart
            git pull origin main

            # Install any new npm packages (fast if nothing changed)
            npm install --prefer-offline --silent 2>/dev/null || npm install --silent

            # DB migrations
            ENV_FILE="exiuscart-backend/.env"
            if [ -f "$ENV_FILE" ]; then
              DB_URL=$(grep ^DATABASE_URL "$ENV_FILE" | cut -d= -f2-)
              if [ -n "$DB_URL" ]; then
                for migration in exiuscart-backend/migrations/*.sql; do
                  [ -f "$migration" ] || continue
                  echo "Applying: $(basename "$migration")"
                  psql "$DB_URL" -f "$migration" || true
                done
              fi
            fi

            # Reload PM2 for changed apps — .next was already synced by rsync above
            [ "${{ needs.changes.outputs.store }}" = "true" ] && pm2 reload exiuscart-store --update-env || true
            [ "${{ needs.changes.outputs.admin }}" = "true" ] && pm2 reload exiuscart-admin --update-env || true

            # Backend: reinstall Python deps if needed then reload
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              cd exiuscart-backend
              source venv/bin/activate
              pip install -r requirements.txt -q
              deactivate
              pm2 reload exiuscart-backend --update-env
            fi

            pm2 save
            echo "=== Deploy complete ==="
            pm2 status
