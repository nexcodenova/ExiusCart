name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      store:    ${{ steps.filter.outputs.store }}
      admin:    ${{ steps.filter.outputs.admin }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/exiuscart-store/**'
            admin:
              - 'apps/exiuscart-admin/**'
            backend:
              - 'exiuscart-backend/**'

  # ── TypeScript + Python syntax check ──────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p apps/exiuscart-store/tsconfig.json
      - run: npx tsc --noEmit -p apps/exiuscart-admin/tsconfig.json
      - run: |
          find exiuscart-backend/app -name "*.py" | xargs python3 -m py_compile
          echo "Backend syntax OK"

  # ── Deploy: pull + build on server ────────────────────────────────────────
  # Build runs on the server so Node version matches the runtime exactly.
  # Affiliates removed from server (runs on Vercel) — 1.3 GB free for builds.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, changes]
    if: always() && needs.typecheck.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/ExiusCart
            git pull origin main

            export NEXT_PUBLIC_API_URL="https://api.exiuscart.com"
            export NEXT_TELEMETRY_DISABLED=1

            # DB migrations
            ENV_FILE="exiuscart-backend/.env"
            if [ -f "$ENV_FILE" ]; then
              DB_URL=$(grep ^DATABASE_URL "$ENV_FILE" | cut -d= -f2-)
              if [ -n "$DB_URL" ]; then
                for migration in exiuscart-backend/migrations/*.sql; do
                  [ -f "$migration" ] || continue
                  echo "Applying: $(basename "$migration")"
                  psql "$DB_URL" -f "$migration" || true
                done
              fi
            fi

            # Backend
            if echo "${{ needs.changes.outputs.backend }}" | grep -q "true"; then
              cd exiuscart-backend
              source venv/bin/activate
              pip install -r requirements.txt -q
              deactivate
              pm2 reload exiuscart-backend --update-env
              cd /var/www/ExiusCart
            fi

            # Store — clear .next fully before build to avoid ENOENT corruption
            if echo "${{ needs.changes.outputs.store }}" | grep -q "true"; then
              rm -rf apps/exiuscart-store/.next
              npm run build --workspace=apps/exiuscart-store
              pm2 reload exiuscart-store --update-env
            fi

            # Admin
            if echo "${{ needs.changes.outputs.admin }}" | grep -q "true"; then
              rm -rf apps/exiuscart-admin/.next
              npm run build --workspace=apps/exiuscart-admin
              pm2 reload exiuscart-admin --update-env
            fi

            pm2 save
            echo "=== Deploy complete ==="
