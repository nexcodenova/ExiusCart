name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      store:       ${{ steps.filter.outputs.store }}
      admin:       ${{ steps.filter.outputs.admin }}
      affiliates:  ${{ steps.filter.outputs.affiliates }}
      backend:     ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/exiuscart-store/**'
            admin:
              - 'apps/exiuscart-admin/**'
            affiliates:
              - 'apps/exiuscart-affiliates/**'
            backend:
              - 'exiuscart-backend/**'

  # ── TypeScript check (fast, catches errors before deploy) ─────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p apps/exiuscart-store/tsconfig.json
      - run: npx tsc --noEmit -p apps/exiuscart-admin/tsconfig.json
      - run: |
          find exiuscart-backend/app -name "*.py" | xargs python3 -m py_compile
          echo "Backend syntax OK"

  # ── Deploy: pull + build on server (no path mismatch) ────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, changes]
    if: always() && needs.typecheck.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd /var/www/ExiusCart
            git pull origin main
            bash deploy.sh
