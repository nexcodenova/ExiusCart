name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

# Only the latest deploy matters. If new commits are pushed while a deploy is
# running/queued, cancel the older ones instead of stacking them up behind the lock.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /var/www/ExiusCart
            git checkout -- . 2>/dev/null || true
            git pull origin main
            bash deploy.sh
